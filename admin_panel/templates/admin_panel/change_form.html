{% extends "admin/change_form.html" %}
{% load static %}

{% block extrahead %}
{{ block.super }}
<style>
    label {
        font-weight: bold !important;
    }
    .form-row label {
        font-weight: bold !important;
    }
    .field-label {
        font-weight: bold !important;
    }
    .fieldBox label {
        font-weight: bold !important;
    }
</style>

<!-- Подключаем Select2 для поиска в выпадающих списках с choices -->
<link rel="stylesheet" type="text/css" href="{% static 'admin/css/autocomplete.css' %}">
<script src="{% static 'admin/js/vendor/select2/select2.full.min.js' %}"></script>
<script>
(function() {
    function initSelect2Search() {
        if (typeof django === 'undefined' || typeof django.jQuery === 'undefined') {
            setTimeout(initSelect2Search, 100);
            return;
        }
        var $ = django.jQuery;

        // Поля, в которых нужен поиск (name атрибут)
        var searchableFields = ['genre', 'cover_type', 'paper_type', 'target_audience', 'age_restrictions', 'language', 'condition', 'book_type']; 

        searchableFields.forEach(function(fieldName) {
            var $select = $('#id_' + fieldName);
            if ($select.length && !$select.data('select2')) {
                $select.select2({
                    width: '20em',
                    minimumResultsForSearch: 1  // поиск на всех полях, даже с 2 опциями
                });
            }
        });
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initSelect2Search);
    } else {
        initSelect2Search();
    }
})();
</script>

<script>
(function() {
    function interceptFormSubmit() {
        var forms = document.querySelectorAll('form');
        forms.forEach(function(form) {
            // Удаляем предыдущие обработчики, если есть
            form.removeEventListener('submit', handleFormSubmit);
            // Добавляем новый обработчик
            form.addEventListener('submit', handleFormSubmit);
        });
    }
    
    function handleFormSubmit(event) {
        var form = event.target;
        if (!form.enctype || form.enctype === 'application/x-www-form-urlencoded') {
            form.enctype = 'multipart/form-data';
            console.log('Enctype set to multipart/form-data before submit');
        }
    }
    
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', interceptFormSubmit);
    } else {
        interceptFormSubmit();
    }
    
    // Наблюдаем за изменениями DOM
    var observer = new MutationObserver(function(mutations) {
        interceptFormSubmit();
    });
    observer.observe(document.body, { childList: true, subtree: true });
})();
</script>
{% endblock %}
